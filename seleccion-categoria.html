<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Elegir categoría - Rally Estudiantil 2.0</title>
  <link rel="stylesheet" href="assets/css/estilos.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="pantalla-rally-nav">
  <button type="button" class="btn-inicio" onclick="irInicio()" aria-label="Volver al inicio">← Inicio</button>
  <div class="rally-container">
    <h1 class="titulo-principal text-center">Elige categoría</h1>
    <p class="text-center mb-2" style="color:var(--primary);">Juego: <strong id="nombre-juego">—</strong></p>

    <div id="contenedor-opciones"></div>
  </div>
  <script>
    function irInicio() {
      window.location.href = 'index.html';
    }
  </script>
  <script src="assets/js/datos.js"></script>
  <script>
    var params = new URLSearchParams(window.location.search);
    var juego = params.get('juego') || '';
    var equipo = '';
    try { equipo = localStorage.getItem('rally_equipo') || ''; } catch (e) {}
    if (!equipo) { window.location.href = 'registro.html'; }
    if (juego !== 'memorama') {
      window.location.href = 'seleccion-juego.html';
    }
    document.getElementById('nombre-juego').textContent = 'Memorama';

    function mezclar(arr) {
      return arr.sort(function () { return Math.random() - 0.5; });
    }

    /** Exactamente 9 categorías; al menos 3 con tematicaNueva === true (si existen en datos). */
    function elegirNueveCategoriasMemorama(todas) {
      if (!todas || !todas.length) return [];
      var nuevas = todas.filter(function (c) { return c.tematicaNueva === true; });
      var idsElegidos = {};
      var elegidas = [];
      mezclar(nuevas);
      var needNuevas = Math.min(3, nuevas.length);
      for (var i = 0; i < needNuevas; i++) {
        elegidas.push(nuevas[i]);
        idsElegidos[nuevas[i].id] = true;
      }
      var resto = todas.filter(function (c) { return !idsElegidos[c.id]; });
      mezclar(resto);
      while (elegidas.length < 9 && resto.length) {
        var c = resto.pop();
        if (!idsElegidos[c.id]) {
          idsElegidos[c.id] = true;
          elegidas.push(c);
        }
      }
      if (elegidas.length < 9) {
        mezclar(todas);
        for (var t = 0; t < todas.length && elegidas.length < 9; t++) {
          if (!idsElegidos[todas[t].id]) {
            idsElegidos[todas[t].id] = true;
            elegidas.push(todas[t]);
          }
        }
      }
      return mezclar(elegidas);
    }

    var cont = document.getElementById('contenedor-opciones');
    if (window.RALLY_DATOS && RALLY_DATOS.memorama) {
      var grid = document.createElement('div');
      grid.className = 'grid-opciones grid-memorama-3x3';
      var categorias = elegirNueveCategoriasMemorama(RALLY_DATOS.memorama.slice());
      categorias.forEach(function (c) {
        var a = document.createElement('a');
        a.href = 'juego.html?tipo=memorama&categoria=' + encodeURIComponent(c.id);
        a.className = 'opcion-card';
        a.innerHTML = '<span class="nombre">' + escapeHtml(c.nombre) + '</span><br><span class="parejas-label">' + c.pares.length + ' parejas</span>';
        grid.appendChild(a);
      });
      cont.appendChild(grid);
    }
    function escapeHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  </script>
</body>
</html>
