<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rally Estudiantil 2.0 - Bienvenida</title>
  <link rel="stylesheet" href="assets/css/estilos.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="pantalla-bienvenida">
  <div class="rally-container">
    <h1 class="titulo-principal text-center">Rally de Ingenierías 2.0</h1>
    <p class="text-center mb-2" style="font-size:1.2rem; color:var(--primary);">
      ¡Bienvenidos a la estación de juegos!
    </p>

    <img src="assets/images/banner-rally.png?v=2" alt="Banner Rally Estudiantil" class="banner-rally" onerror="this.style.display='none'">

    <div class="logos-programas">
      <div class="logo-prog-wrap">
        <img class="logo-prog" src="assets/images/logo-mecanica.png" alt="Ingeniería Mecánica" onerror="this.remove()">
      </div>
      <div class="logo-prog-wrap">
        <img class="logo-prog" src="assets/images/logo-industrial.png" alt="Ingeniería Industrial" onerror="this.remove()">
      </div>
      <div class="logo-prog-wrap logo-prog-wrap--sistemas">
        <img class="logo-prog logo-prog--sistemas" src="assets/images/logo-sistemas.png?v=3" alt="Ingeniería de Sistemas" onerror="this.remove()">
      </div>
      <div class="logo-prog-wrap">
        <img class="logo-prog" src="assets/images/logo-datos-ia.png" alt="Ingeniería de Datos e IA" onerror="this.remove()">
      </div>
      <div class="logo-prog-wrap">
        <img class="logo-prog" src="assets/images/logo-multimedia.png" alt="Ingeniería Multimedia" onerror="this.remove()">
      </div>
    </div>

    <p class="text-center mt-2" style="margin-bottom:16px;">
      <button type="button" class="btn-rally outline" id="btn-ver-tiempos">Ver tiempos acumulados</button>
      <button type="button" class="btn-rally outline" id="btn-reiniciar-tiempos" style="margin-left:8px;">Reiniciar tiempos</button>
    </p>

    <a href="instrucciones.html" class="btn-rally">START / INICIAR</a>
  </div>
  <script src="assets/js/rally-tiempo.js"></script>
</body>
</html>
