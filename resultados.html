<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resultados - Rally Estudiantil 2.0</title>
  <link rel="stylesheet" href="assets/css/estilos.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="pantalla-resultados pantalla-rally-nav">
  <button type="button" class="btn-inicio" onclick="irInicio()" aria-label="Volver al inicio">← Inicio</button>
  <div class="efectos-celebracion" id="confetti-container"></div>
  <div class="rally-container">
    <h1 class="titulo-principal text-center">¡Juego completado!</h1>
    <div class="panel-rally text-center">
      <p id="mensaje-maximo" class="mb-2" style="font-size:1.1rem;color:#ff6b6b;display:none;"></p>
      <p class="resultado-tiempo-destacado" id="tiempo-texto">Tiempo invertido: —</p>
      <p class="mt-2" style="font-size:1.1rem;color:var(--primary);">Buen trabajo en equipo.</p>
      <p class="mt-2">
        <a href="index.html" class="btn-rally">Continuar a otra estación</a>
      </p>
    </div>
  </div>
  <script>
    function irInicio() {
      window.location.href = 'index.html';
    }
  </script>
  <script src="assets/js/rally-tiempo.js"></script>
  <script>
    var params = new URLSearchParams(window.location.search);
    var tiempoMs = parseInt(params.get('tiempo_ms'), 10);
    if (isNaN(tiempoMs) || tiempoMs < 0) {
      var sec = parseInt(params.get('tiempo'), 10) || 0;
      tiempoMs = sec * 1000;
    }
    var texto = window.RALLY_TIEMPO
      ? ('Tiempo invertido: ' + window.RALLY_TIEMPO.formatearTiempo(tiempoMs))
      : 'Tiempo invertido: —';
    document.getElementById('tiempo-texto').textContent = texto;
    if (params.get('maximo') === '1') {
      var m = document.getElementById('mensaje-maximo');
      m.textContent = 'Tiempo máximo alcanzado (3:00)';
      m.style.display = 'block';
    }
    var colores = ['#00d4ff','#00ff88','#7b68ee','#ff6b9d','#ffd93d'];
    var container = document.getElementById('confetti-container');
    for (var i = 0; i < 80; i++) {
      var p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.left = Math.random()*100 + '%';
      p.style.top = '-10px';
      p.style.background = colores[i % colores.length];
      p.style.animationDelay = Math.random()*2 + 's';
      p.style.animationDuration = (3 + Math.random()*3) + 's';
      container.appendChild(p);
    }
  </script>
</body>
</html>
